<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Ledger</title>
  <meta name="description" content="Track investments across multiple brokers in one place." />
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <div class="app">

    <!-- ===================== SIDEBAR (desktop) ===================== -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">IL</span>
        <span class="brand-name">Investment Ledger</span>
      </div>

      <nav class="nav" aria-label="Primary">
        <a class="nav-item" href="#/dashboard" data-page="dashboard"><span class="ni-ico">▦</span>Dashboard</a>
        <a class="nav-item" href="#/portfolio" data-page="portfolio"><span class="ni-ico">▤</span>Portfolio</a>
        <a class="nav-item" href="#/transactions" data-page="transactions"><span class="ni-ico">⇄</span>Transactions</a>
        <a class="nav-item" href="#/cash" data-page="cash"><span class="ni-ico">▣</span>Cash Ledger</a>
        <a class="nav-item" href="#/dividends" data-page="dividends"><span class="ni-ico">◷</span>Dividends</a>
        <a class="nav-item" href="#/reports" data-page="reports"><span class="ni-ico">▥</span>Reports</a>

        <div class="nav-sep"></div>
        <a class="nav-item" href="#/brokers" data-page="brokers"><span class="ni-ico">▢</span>Brokers</a>

        <div class="nav-sep"></div>
        <a class="nav-item" href="#/settings" data-page="settings"><span class="ni-ico">⚙</span>Settings</a>
        <a class="nav-item" href="#/help" data-page="help"><span class="ni-ico">?</span>Help</a>
      </nav>

      <div class="sidebar-foot">
        <div class="base-pill">Base currency<strong id="baseCurrency">MYR</strong></div>
      </div>
    </aside>

    <!-- ===================== MAIN ===================== -->
    <main class="main">
      <!-- Topbar -->
      <header class="topbar">
        <button class="icon-btn only-mobile" id="menuBtn" aria-label="Open menu">☰</button>
        <div class="topbar-title">
          <h1 id="pageTitle">Dashboard</h1>
          <p class="muted" id="pageSubtitle">Welcome back — here is your portfolio at a glance.</p>
        </div>
        <div class="topbar-actions">
          <button class="btn ghost" id="exportBtn">⭳ Export CSV</button>
          <button class="btn primary only-desktop" id="addTxBtn">＋ Add Transaction</button>
          <button class="icon-btn" id="themeBtn" aria-label="Toggle theme" title="Toggle dark / light">◐</button>
        </div>
      </header>

      <!-- Router renders pages here -->
      <div class="content" id="page"></div>
    </main>
  </div>

  <!-- ===== Mobile bottom nav ===== -->
  <nav class="bottom-nav" aria-label="Mobile">
    <a class="bn-item" href="#/dashboard" data-page="dashboard"><span>▦</span>Dashboard</a>
    <a class="bn-item" href="#/portfolio" data-page="portfolio"><span>▤</span>Portfolio</a>
    <a class="bn-item add" href="#/add" data-page="add"><span>＋</span>Add</a>
    <a class="bn-item" href="#/dividends" data-page="dividends"><span>◷</span>Dividends</a>
    <a class="bn-item" href="#/more" id="moreBtn"><span>⋯</span>More</a>
  </nav>

  <!-- ===== Calculation breakdown modal ===== -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h3 id="modalTitle">How this was calculated</h3>
        <button class="icon-btn" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="data.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
